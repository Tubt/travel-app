version: '3.8'

services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - travel-app-dev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  cypress-dev:
    build:
      context: .
      dockerfile: Dockerfile.cypress
    depends_on:
      app-dev:
        condition: service_healthy
    environment:
      - CYPRESS_baseUrl=http://app-dev:5173
      - CYPRESS_video=true
      - CYPRESS_screenshotOnRunFailure=true
    volumes:
      - ./test/results:/app/results
      - ./test:/app
    networks:
      - travel-app-dev-network
    command: ["sh", "-c", "sleep 10 && npm run cypress:run"]

networks:
  travel-app-dev-network:
    driver: bridge 