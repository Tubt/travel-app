version: '3.8'

services:
  # Travel App Service
  travel-app:
    build: .
    ports:
      - '5173:5173'
    environment:
      - NODE_ENV=production
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:5173',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Cypress E2E Tests Service
  cypress:
    image: cypress/included:13.17.0
    depends_on:
      travel-app:
        condition: service_healthy
    environment:
      - CYPRESS_baseUrl=http://travel-app:5173
    working_dir: /e2e
    volumes:
      - ./test:/e2e
    command: >
      sh -c "
        npm ci &&
        npx cypress run --spec 'e2e/integration/userJourney.cy.ts' --env grepTags=checklist_integrated
      "
