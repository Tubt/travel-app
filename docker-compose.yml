services:
  app:
    image: travel-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - travel-app-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  cypress:
    image: travel-app-cypress:latest
    build:
      context: .
      dockerfile: Dockerfile.cypress
    depends_on:
      app:
        condition: service_healthy
    environment:
      - CYPRESS_baseUrl=http://app:3000
      - CYPRESS_video=true
      - CYPRESS_screenshotOnRunFailure=true
      - NO_COLOR=1
      - FORCE_COLOR=0
      - CYPRESS_PARALLEL=true
      - CYPRESS_RECORD=false
    volumes:
      - ./test/results:/app/results
    networks:
      - travel-app-network
    command: ["npm", "run", "test:integration"]

networks:
  travel-app-network:
    driver: bridge

volumes:
  cypress-results:
    driver: local
