name: Tusk E2E Test Suite

on:
  workflow_dispatch:
    inputs:
      runId:
        description: "Tusk Run ID"
        required: true
      tuskUrl:
        description: "Tusk server URL"
        required: true
      commitSha:
        description: "Commit SHA to checkout"
        required: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commitSha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: |
          docker compose up --build -d app

      - name: Wait for app to be ready
        run: |
          timeout 60 sh -c 'until curl -f http://localhost:3000; do sleep 2; done'

      - name: Start runner
        id: test-action
        uses: Use-Tusk/test-runner@v1
        with:
          runId: ${{ github.event.inputs.runId }}
          tuskUrl: ${{ github.event.inputs.tuskUrl }}
          commitSha: ${{ github.event.inputs.commitSha }}
          authToken: ${{ secrets.TUSK_AUTH_TOKEN }}
          testFramework: "cypress"
          testFileRegex: "^test/e2e/integration/.*\\.cy\\.ts$"
          testScript: "docker compose up --build cypress"

      - name: Stop services
        if: always()
        run: |
          docker compose down

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tusk-cypress-results
          path: test/results/
          retention-days: 30
