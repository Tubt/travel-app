name: E2E Checklist Tests

on:
  workflow_dispatch:
    inputs:
      test_tags:
        description: 'Test tags to run (e.g., checklist_integrated)'
        required: false
        default: 'checklist_integrated'
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  checklist-e2e:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 22.13.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: 'npm'

      - name: Build and run with Docker Compose
        run: |
          docker-compose up --build --abort-on-container-exit --exit-code-from cypress

      - name: Copy test results from container
        if: always()
        run: |
          docker-compose ps
          mkdir -p test/results
          docker cp $(docker-compose ps -q cypress):/e2e/results ./test/ || echo "No results to copy"

      - name: Create test summary
        if: always()
        run: |
          echo "## 🧪 E2E Checklist Tests Results" >> $GITHUB_STEP_SUMMARY
          echo "### Test Configuration:" >> $GITHUB_STEP_SUMMARY
          echo "- **Test file:** \`userJourney.cy.ts\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`checklist_integrated\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Browser:** Chrome (headless)" >> $GITHUB_STEP_SUMMARY
          echo "- **Base URL:** http://localhost:5173" >> $GITHUB_STEP_SUMMARY
          echo "- **Retries:** 2" >> $GITHUB_STEP_SUMMARY
          echo "- **Node.js:** 22.13.0" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload screenshots (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ github.run_number }}
          path: test/results/screenshots
          retention-days: 7

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-${{ github.run_number }}
          path: test/results/videos
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-results-${{ github.run_number }}
          path: test/results
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          echo "## ❌ E2E Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Check the uploaded screenshots and videos" >> $GITHUB_STEP_SUMMARY
          echo "2. Review test logs above" >> $GITHUB_STEP_SUMMARY
          echo "3. Run tests locally: \`npm run test:checklist\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Check if application is working at http://localhost:5173" >> $GITHUB_STEP_SUMMARY

      - name: Success notification
        if: success()
        run: |
          echo "## ✅ E2E Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "All checklist integrated tests completed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Homepage UI elements verification" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Responsive design check (mobile/tablet/desktop)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Content structure validation" >> $GITHUB_STEP_SUMMARY 