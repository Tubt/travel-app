name: Tusk E2E Test Suite

on:
  workflow_dispatch:
    inputs:
      runId:
        description: "Tusk Run ID"
        required: true
      tuskUrl:
        description: "Tusk server URL"
        required: true
      commitSha:
        description: "Commit SHA to checkout"
        required: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commitSha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          cd test && npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set unique project name
        run: |
          echo "COMPOSE_PROJECT_NAME=tusk-${{ github.event.inputs.runId }}-$(date +%s)" >> $GITHUB_ENV

      - name: Build and start services
        run: |
          docker compose up --build -d app
        env:
          DOCKER_BUILDKIT: 1

      - name: Wait for app to be ready
        run: |
          timeout 120 sh -c 'until curl -f http://localhost:3000/health || curl -f http://localhost:3000; do sleep 5; done'

      - name: Set environment variables for TUSK
        run: |
          echo "CYPRESS_baseUrl=http://localhost:3000" >> $GITHUB_ENV
          echo "CYPRESS_video=true" >> $GITHUB_ENV
          echo "CYPRESS_screenshotOnRunFailure=true" >> $GITHUB_ENV
          echo "NO_COLOR=1" >> $GITHUB_ENV

      - name: Debug connection
        run: |
          echo "Testing TUSK server connectivity..."
          curl -v "${{ github.event.inputs.tuskUrl }}/health" || echo "TUSK server not reachable"
          echo "Testing app connectivity..."
          curl -v http://localhost:3000 || echo "App not reachable"

      - name: Start runner
        id: test-action
        uses: Use-Tusk/test-runner@v1
        with:
          runId: ${{ github.event.inputs.runId }}
          tuskUrl: ${{ github.event.inputs.tuskUrl }}
          commitSha: ${{ github.event.inputs.commitSha }}
          authToken: ${{ secrets.TUSK_AUTH_TOKEN }}
          testFramework: "cypress"
          testFileRegex: "^test/e2e/integration/.*\\.cy\\.ts$"
          testScript: "cd test && npm run test:integration"
          timeout: 1800
          pollInterval: 5000
        env:
          CYPRESS_baseUrl: http://localhost:3000
          CYPRESS_video: true
          CYPRESS_screenshotOnRunFailure: true
          NO_COLOR: 1

      - name: Stop services
        if: always()
        run: |
          docker compose down --remove-orphans --volumes

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tusk-cypress-results
          path: test/results/
          retention-days: 30
