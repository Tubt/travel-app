name: Checklist Test (Conditional)

on:
  workflow_dispatch:
    inputs:
      test_tags:
        description: "Test tags to run"
        required: false
        default: "checklist_integrated"
        type: choice
        options:
          - "checklist_integrated"
          - "checklist_smoke"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: |
          docker compose up --build -d app

      - name: Wait for app to be ready
        run: |
          timeout 60 sh -c 'until curl -f http://localhost:3000; do sleep 2; done'

      - name: Run Integrated Tests
        if: inputs.test_tags == 'checklist_integrated'
        run: |
          docker compose -f docker-compose.yml -f docker-compose.integrated.yml up --build cypress

      - name: Run Smoke Tests
        if: inputs.test_tags == 'checklist_smoke'
        run: |
          docker compose -f docker-compose.yml -f docker-compose.smoke.yml up --build cypress

      - name: Stop services
        if: always()
        run: |
          docker compose down

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-results-${{ inputs.test_tags }}
          path: test/results/
          retention-days: 30
