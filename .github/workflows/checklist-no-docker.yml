name: Tusk Test Runner (No Docker)

on:
  workflow_dispatch:
    inputs:
      runId:
        description: "Tusk Run ID"
        required: true
      tuskUrl:
        description: "Tusk server URL"
        required: true
      commitSha:
        description: "Commit SHA to checkout"
        required: true

jobs:
  test-action:
    name: Tusk Test Runner (No Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commitSha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          cd test && npm ci

      - name: Build app
        run: npm run build

      - name: Start app in background
        run: |
          npm run preview &
          sleep 10

      - name: Wait for app to be ready
        run: |
          timeout 60 sh -c 'until curl -f http://localhost:4173; do sleep 2; done'

      - name: Start runner
        id: test-action
        uses: Use-Tusk/test-runner@v1
        with:
          runId: ${{ github.event.inputs.runId }}
          tuskUrl: ${{ github.event.inputs.tuskUrl }}
          commitSha: ${{ github.event.inputs.commitSha }}
          authToken: ${{ secrets.TUSK_AUTH_TOKEN }}
          testFramework: "cypress"
          testFileRegex: "^test/e2e/.*\\.cy\\.(js|ts)$"
          testScript: "cd test && CYPRESS_baseUrl=http://localhost:4173 node tusk-test-runner.js {{ file }}"
