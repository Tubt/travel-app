name: Checklist Test

on:
  workflow_dispatch:
    inputs:
      test_tags:
        description: "Test tags to run (e.g., checklist_integrated)"
        required: false
        default: "checklist_integrated"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: |
          docker compose up --build -d app

      - name: Wait for app to be ready
        run: |
          timeout 60 sh -c 'until curl -f http://localhost:3000; do sleep 2; done'

      - name: Run Cypress tests
        env:
          TEST_TAG: ${{ inputs.test_tags }}
        run: |
          # Create temporary docker-compose override
          cat > docker-compose.override.yml << EOF
          version: "3.8"
          services:
            cypress:
              command: ["sleep 10 && npm run test:tag $TEST_TAG"]
          EOF

          docker compose -f docker-compose.yml -f docker-compose.override.yml up --build cypress

      - name: Stop services
        if: always()
        run: |
          docker compose down

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-results-${{ inputs.test_tags }}
          path: test/results/
          retention-days: 30
